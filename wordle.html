<script src="assets/js/app.js"></script>
  <script>
  
  const MAX_TENTATIVAS = 6;

  let PALAVRA = "";
  let LETRAS  = 0;
  let tentativas = [];
  let tentativaAtual = [];
  let jogoFinalizado = false;
  let historicoCores = {};
  let emojiGrid = [];

  function hoje() {
    const d = new Date();
    return String(d.getDate()).padStart(2,'0') + "/" + String(d.getMonth()+1).padStart(2,'0') + "/" + d.getFullYear();
  }

  /* JSONP — único método que funciona de GitHub Pages para GAS */
  function carregarPalavra() {
    const cbName = "cb_wordle_" + Date.now();
    const url = API_URL + "?action=wordle&data=" + encodeURIComponent(hoje()) + "&callback=" + cbName;

    const timer = setTimeout(function() {
      delete window[cbName];
      document.getElementById("wordleLoading").style.display = "none";
      document.getElementById("wordleErro").style.display = "block";
    }, 10000);

    window[cbName] = function(json) {
      clearTimeout(timer);
      delete window[cbName];
      var s = document.getElementById("_wscript");
      if (s) s.remove();

      if (!json || !json.palavra) {
        document.getElementById("wordleLoading").style.display = "none";
        document.getElementById("wordleErro").style.display = "block";
        return;
      }

      PALAVRA = json.palavra.toUpperCase().trim();
      LETRAS  = PALAVRA.length;

      var dateEl = document.getElementById("wordleDate");
        if (dateEl) dateEl.textContent = new Date().toLocaleDateString("pt-BR", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
       

      document.getElementById("wordleLoading").style.display = "none";
      document.getElementById("wordleGame").style.display    = "block";

      construirGrid();
      construirTeclado();
    };

    var script = document.createElement("script");
    script.id  = "_wscript";
    script.src = url;
    script.onerror = function() {
      clearTimeout(timer);
      delete window[cbName];
      document.getElementById("wordleLoading").style.display = "none";
      document.getElementById("wordleErro").style.display = "block";
    };
    document.head.appendChild(script);
  }

  function construirGrid() {
    var grid = document.getElementById("wordleGrid");
    grid.innerHTML = "";
    for (var r = 0; r < MAX_TENTATIVAS; r++) {
      var row = document.createElement("div");
      row.className = "wordle-row";
      row.id = "row-" + r;
      for (var c = 0; c < LETRAS; c++) {
        var cell = document.createElement("div");
        cell.className = "wordle-cell";
        cell.id = "cell-" + r + "-" + c;
        row.appendChild(cell);
      }
      grid.appendChild(row);
    }
  }

  function construirTeclado() {
    var kb = document.getElementById("wordleKb");
    kb.innerHTML = "";
    var linhas = [
      ["Q","W","E","R","T","Y","U","I","O","P"],
      ["A","S","D","F","G","H","J","K","L"],
      ["ENTER","Z","X","C","V","B","N","M","⌫"]
    ];
    linhas.forEach(function(linha) {
      var row = document.createElement("div");
      row.className = "kb-row";
      linha.forEach(function(letra) {
        var btn = document.createElement("button");
        btn.className = "kb-key" + (letra === "ENTER" || letra === "⌫" ? " kb-key--wide" : "");
        btn.textContent = letra;
        btn.setAttribute("data-key", letra);
        btn.addEventListener("click", function() { processarTecla(letra); });
        row.appendChild(btn);
      });
      kb.appendChild(row);
    });
  }

  document.addEventListener("keydown", function(e) {
    if (jogoFinalizado) return;
    if (e.key === "Enter") processarTecla("ENTER");
    else if (e.key === "Backspace") processarTecla("⌫");
    else if (/^[a-zA-ZÀ-ú]$/.test(e.key)) processarTecla(e.key.toUpperCase());
  });

  function processarTecla(k) {
    if (jogoFinalizado) return;
    var linha = tentativas.length;
    if (k === "⌫") {
      if (tentativaAtual.length > 0) { tentativaAtual.pop(); renderizarAtual(); }
    } else if (k === "ENTER") {
      if (tentativaAtual.length < LETRAS) { setMsg("Palavra muito curta.", "erro"); shake(linha); return; }
      confirmarTentativa();
    } else if (tentativaAtual.length < LETRAS) {
      tentativaAtual.push(k);
      renderizarAtual();
      popCell(linha, tentativaAtual.length - 1);
    }
  }

  function renderizarAtual() {
    var linha = tentativas.length;
    for (var c = 0; c < LETRAS; c++) {
      var cell = document.getElementById("cell-" + linha + "-" + c);
      var letra = tentativaAtual[c] || "";
      cell.textContent = letra;
      cell.className = "wordle-cell" + (letra ? " filled" : "") + (c === tentativaAtual.length - 1 && letra ? " active" : "");
    }
  }

  function popCell(r, c) {
    var cell = document.getElementById("cell-" + r + "-" + c);
    cell.classList.remove("pop"); void cell.offsetWidth; cell.classList.add("pop");
  }

  function shake(r) {
    var row = document.getElementById("row-" + r);
    row.classList.remove("shake"); void row.offsetWidth; row.classList.add("shake");
    setTimeout(function() { row.classList.remove("shake"); }, 500);
  }

  function setMsg(txt, tipo) {
    tipo = tipo || "";
    var el = document.getElementById("wordleMsg");
    el.textContent = txt;
    el.className = "wordle-msg" + (tipo ? " wordle-msg--" + tipo : "");
    if (tipo !== "ok" && txt) setTimeout(function() { el.textContent = ""; el.className = "wordle-msg"; }, 2200);
  }

  function confirmarTentativa() {
    var guess  = tentativaAtual.join("");
    var linha  = tentativas.length;
    var result = avaliarPalpite(guess);
    tentativas.push({ guess: guess, resultado: result });
    tentativaAtual = [];

    var emojiRow = result.map(function(r) { return r === "correct" ? "🟩" : r === "present" ? "🟨" : "⬛"; });
    emojiGrid.push(emojiRow.join(""));

    revelarLinha(linha, guess, result, function() {
      result.forEach(function(res, i) {
        var letra = guess[i];
        var prio  = { correct: 3, present: 2, absent: 1 };
        var atual = historicoCores[letra];
        if (!atual || prio[res] > prio[atual]) {
          historicoCores[letra] = res;
          var btn = document.querySelector('[data-key="' + letra + '"]');
          if (btn) btn.className = "kb-key" + (letra.length > 1 ? " kb-key--wide" : "") + " " + res;
        }
      });

      if (guess === PALAVRA) {
        jogoFinalizado = true;
        var msgs = ["Perfeito! 🎉","Incrível!","Muito bem!","Acertou!","Quase fácil demais 😄","Na última!"];
        setTimeout(function() { mostrarResultado(true, msgs[Math.min(linha, 5)]); }, 400);
      } else if (tentativas.length >= MAX_TENTATIVAS) {
        jogoFinalizado = true;
        setTimeout(function() { mostrarResultado(false, ""); }, 400);
      }
    });
  }

  function avaliarPalpite(guess) {
    var resultado  = Array(LETRAS).fill("absent");
    var palavraArr = PALAVRA.split("");
    var guessArr   = guess.split("");
    var usados     = Array(LETRAS).fill(false);

    guessArr.forEach(function(l, i) {
      if (l === palavraArr[i]) { resultado[i] = "correct"; usados[i] = true; }
    });
    guessArr.forEach(function(l, i) {
      if (resultado[i] === "correct") return;
      var idx = palavraArr.findIndex(function(pl, pi) { return pl === l && !usados[pi]; });
      if (idx !== -1) { resultado[i] = "present"; usados[idx] = true; }
    });
    return resultado;
  }

  function revelarLinha(linha, guess, resultado, cb) {
    resultado.forEach(function(res, c) {
      var cell = document.getElementById("cell-" + linha + "-" + c);
      setTimeout(function() {
        cell.classList.add("flipping");
        setTimeout(function() {
          cell.textContent = guess[c];
          cell.className = "wordle-cell " + res + " flipped";
          if (c === LETRAS - 1) setTimeout(cb, 200);
        }, 250);
      }, c * 120);
    });
  }

  function mostrarResultado(ganhou, msg) {
    document.getElementById("wordleGame").style.display   = "none";
    document.getElementById("wordleResult").style.display = "block";
    document.getElementById("resultIcon").textContent  = ganhou ? "🎉" : "💔";
    document.getElementById("resultTitle").textContent = ganhou ? msg : "Quase!";
    document.getElementById("resultWord").textContent  = ganhou
      ? "Você acertou em " + tentativas.length + " tentativa" + (tentativas.length > 1 ? "s" : "") + "!"
      : "A palavra era: " + PALAVRA;
  }

  window.compartilharWordle = function() {
    var d   = hoje();
    var txt = "Wordle do Casamento Tiago & Gian 🌿\n" + d + " · " + tentativas.length + "/" + MAX_TENTATIVAS + "\n\n" + emojiGrid.join("\n") + "\n\nhttps://gianmariaparadisi.github.io/casamento/wordle.html";
    if (navigator.share) {
      navigator.share({ text: txt }).catch(function(){});
    } else {
      navigator.clipboard.writeText(txt).then(function() {
        var btn = document.querySelector(".wordle-result__share .btn");
        var orig = btn.textContent;
        btn.textContent = "Copiado!";
        setTimeout(function() { btn.textContent = orig; }, 2000);
      });
    }
  };

  document.addEventListener("DOMContentLoaded", function() {
  carregarPalavra();
  });
  </script>
