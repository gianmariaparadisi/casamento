<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirmação de Presença</title>

<style>

body{
    font-family: Arial, sans-serif;
    max-width:800px;
    margin:auto;
    padding:40px 20px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    box-sizing:border-box;
}

button{
    padding:12px 20px;
    margin-top:10px;
    cursor:pointer;
}

.card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-top:15px;
}

.oculto{
    display:none;
}

</style>
</head>
<body>

<h1>Confirmação de Presença</h1>

<p>Digite seu nome:</p>

<input
    id="nomeBusca"
    placeholder="Ex: Gian"
/>

<button onclick="buscar()">
Buscar
</button>

<div id="resultado"></div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbyYyCrT2oNLYDLcXDWq8X2b9Y0u0EbmQ7pUnpdRA3g0wZNUDtX0VTNrHq26wIngBwHn/exec";

let convidadoSelecionado = null;

async function buscar(){

    const nome =
        document.getElementById("nomeBusca").value;

    const resposta =
        await fetch(
            API + "?nome=" +
            encodeURIComponent(nome)
        );

    const dados =
        await resposta.json();

    const div =
        document.getElementById("resultado");

    div.innerHTML = "";

    if(dados.length === 0){

        div.innerHTML =
        "<p>Nenhum convidado encontrado.</p>";

        return;
    }

    dados.forEach(item => {

        div.innerHTML += `
        <div class="card">

            <strong>${item.nome}</strong><br>
            Telefone: ${item.telefone}

            <br><br>

            <button onclick='selecionar(${JSON.stringify(item)})'>
            Selecionar
            </button>

        </div>
        `;

    });

}

function selecionar(item){

    convidadoSelecionado = item;

    document.getElementById("resultado").innerHTML = `

    <div class="card">

        <h3>${item.nome}</h3>

        <p>
        Telefone cadastrado:
        ${item.telefone}
        </p>

        <label>
        Últimos 4 dígitos:
        </label>

        <input
            id="ultimos4"
            maxlength="4"
        >

        <label>
        Email:
        </label>

        <input
            id="email"
            type="email"
        >

        <br>

        <button onclick="confirmar()">
        Confirmar presença
        </button>

    </div>
    `;
}

async function confirmar(){

    const ultimos4 =
        document.getElementById("ultimos4").value;

    const email =
        document.getElementById("email").value;

    const resposta =
        await fetch(
            API,
            {
                method:"POST",
                body:JSON.stringify({
                    nome:convidadoSelecionado.nome,
                    ultimos4:ultimos4,
                    email:email,
                    status:"SIM"
                })
            }
        );

    const json =
        await resposta.json();

    if(json.sucesso){

        document.getElementById("resultado").innerHTML = `
        <div class="card">
            <h3>Presença confirmada ❤️</h3>
            <p>
            Email registrado:
            ${email}
            </p>
        </div>
        `;

    }else{

        alert(
            json.erro ||
            "Erro ao confirmar"
        );

    }

}

</script>

</body>
</html>
